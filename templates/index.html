<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PeopleXM Voice Bot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #F8FAFC;
    color: #0F172A;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    width: 100%;
    max-width: 720px;
    padding: 18px 20px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .header-left h1 {
    font-size: 18px;
    font-weight: 700;
    color: #0F172A;
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .header-logo-icon {
    width: 32px; height: 32px;
    border-radius: 9px;
    background: linear-gradient(135deg, #6366F1, #8B5CF6);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .header-left .sub {
    font-size: 12px;
    color: #94A3B8;
    margin-top: 4px;
    margin-left: 41px;
  }

  .header-links {
    font-size: 12px;
    margin-top: 6px;
    margin-left: 41px;
    display: flex;
    gap: 6px;
  }

  .header-links a {
    color: #6366F1;
    text-decoration: none;
    padding: 4px 10px;
    border-radius: 7px;
    font-weight: 500;
    transition: background 0.15s;
  }

  .header-links a:hover { background: #EEF2FF; }

  /* kb-badge — exact id kept: #kb-badge */
  .kb-badge {
    background: #ECFDF5;
    color: #065F46;
    font-size: 12px;
    padding: 5px 13px;
    border-radius: 20px;
    font-weight: 600;
    white-space: nowrap;
    margin-top: 4px;
  }

  /* ── Suggestion chips ── */
  .suggestions {
    width: 100%;
    max-width: 720px;
    padding: 12px 20px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .suggestion-chip {
    background: #fff;
    border: 1px solid #E2E8F0;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: #6366F1;
    cursor: pointer;
    white-space: nowrap;
    font-weight: 500;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
  }

  .suggestion-chip:hover {
    background: #EEF2FF;
    border-color: #6366F1;
    transform: translateY(-1px);
  }

  /* ── Chat window ── */
  .chat-window {
    flex: 1;
    width: 100%;
    max-width: 720px;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ── Bubbles — all original class names kept exactly ── */
  .bubble {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
  }

  .bubble.user {
    background: #6366F1;
    color: #fff;
    border-bottom-right-radius: 4px;
    align-self: flex-end;
    box-shadow: 0 2px 8px rgba(99,102,241,0.25);
  }

  .bubble.bot {
    background: #fff;
    border: 1px solid #E2E8F0;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    max-width: 88%;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  .bubble.thinking {
    color: #94A3B8;
    font-style: italic;
    border: 1px dashed #E2E8F0;
    background: #F8FAFC;
    align-self: flex-start;
    border-radius: 18px;
  }

  .bubble.not-found {
    background: #FEF2F2;
    border: 1px solid #FECACA;
    align-self: flex-start;
    color: #991B1B;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
  }

  /* ── Inner bubble elements — all original class names kept ── */
  .warning-tag {
    font-size: 12px;
    color: #92400E;
    background: #FFFBEB;
    border-radius: 7px;
    padding: 4px 9px;
    margin-bottom: 9px;
    display: inline-block;
    font-weight: 500;
  }

  .matched-tag {
    font-size: 11px;
    color: #94A3B8;
    margin-top: 9px;
  }

  .conf-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }

  .conf-bar-bg {
    flex: 1;
    height: 5px;
    background: #F1F5F9;
    border-radius: 3px;
    overflow: hidden;
  }

  .conf-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .4s;
  }

  .conf-pct {
    font-size: 11px;
    color: #94A3B8;
    min-width: 30px;
    font-weight: 600;
  }

  .play-btn {
    font-size: 12px;
    color: #6366F1;
    background: none;
    border: 1px solid #C7D2FE;
    border-radius: 20px;
    padding: 5px 13px;
    cursor: pointer;
    margin-top: 10px;
    font-weight: 500;
    transition: background 0.15s, border-color 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .play-btn:hover {
    background: #EEF2FF;
    border-color: #6366F1;
  }

  /* ── Input area ── */
  .input-area {
    width: 100%;
    max-width: 720px;
    padding: 8px 20px 16px;
  }

  /* upload-row — exact id #faq-upload kept */
  .upload-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    background: #fff;
    border: 1px solid #E2E8F0;
    border-radius: 12px;
    padding: 8px 12px;
  }

  #faq-upload {
    font-size: 12px;
    color: #94A3B8;
    flex: 1;
    min-width: 0;
  }

  .upload-btn {
    font-size: 12px;
    padding: 6px 14px;
    border: 1px solid #E2E8F0;
    border-radius: 20px;
    background: #F8FAFC;
    cursor: pointer;
    color: #475569;
    white-space: nowrap;
    font-weight: 500;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }

  .upload-btn:hover {
    border-color: #6366F1;
    color: #6366F1;
    background: #EEF2FF;
  }

  /* #upload-status — exact id kept */
  #upload-status {
    font-size: 12px;
    color: #10B981;
    font-weight: 500;
  }

  /* input-row — exact ids #mic-btn, #query-box, #send-btn kept */
  .input-row {
    display: flex;
    gap: 8px;
    align-items: center;
    background: #fff;
    border: 1.5px solid #E2E8F0;
    border-radius: 28px;
    padding: 6px 6px 6px 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    transition: border-color 0.15s;
  }

  .input-row:focus-within { border-color: #6366F1; }

  #query-box {
    flex: 1;
    padding: 7px 0;
    border: none;
    border-radius: 0;
    font-size: 14px;
    outline: none;
    background: transparent;
    font-family: inherit;
    color: #0F172A;
  }

  #query-box::placeholder { color: #94A3B8; }

  #mic-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid #C7D2FE;
    background: #EEF2FF;
    cursor: pointer;
    font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .2s;
  }

  /* .listening class — exact name kept, used by JS */
  #mic-btn.listening {
    background: #6366F1;
    color: #fff;
    border-color: #6366F1;
    box-shadow: 0 0 0 5px rgba(99,102,241,0.18);
  }

  #send-btn {
    padding: 9px 22px;
    background: #6366F1;
    color: #fff;
    border: none;
    border-radius: 22px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
    flex-shrink: 0;
    transition: opacity 0.15s;
    font-family: inherit;
  }

  #send-btn:hover { opacity: 0.88; }

  /* system-msg — exact class kept, used by JS */
  .system-msg {
    text-align: center;
    font-size: 12px;
    color: #94A3B8;
  }

  /* ── Typing dots animation (new, non-breaking) ── */
  .typing-dots { display: inline-flex; gap: 4px; align-items: center; }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: #94A3B8;
    display: inline-block;
    animation: td 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes td { 0%,80%,100%{transform:scale(.5);opacity:.4} 40%{transform:scale(1);opacity:1} }

  /* ── Scrollbar ── */
  .chat-window::-webkit-scrollbar { width: 4px; }
  .chat-window::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 4px; }
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <div class="header-left">
    <h1>
      <div class="header-logo-icon">🤖</div>
      PeopleXM Voice Bot
    </h1>
    <p class="sub">Ask your HR questions — speak or type</p>
    <div class="header-links">
      <a href="/admin">Analytics</a>
      <a href="/manage-faq">Manage FAQ</a>
    </div>
  </div>
  <!-- exact id: kb-badge, exact variable: faq_count -->
  <div class="kb-badge" id="kb-badge">{{ faq_count }} FAQs loaded</div>
</div>

<!-- ── Suggestion chips — exact Jinja: sample_questions loop ── -->
{% if sample_questions %}
<div class="suggestions" id="suggestions">
  {% for q in sample_questions %}
  <div class="suggestion-chip" onclick="useChip(this.textContent)">{{ q }}</div>
  {% endfor %}
</div>
{% endif %}

<!-- ── Chat window — exact id: chat ── -->
<div class="chat-window" id="chat"></div>

<!-- ── Input area ── -->
<div class="input-area">

  <div class="upload-row">
    <!-- exact id: faq-upload, exact accept attribute kept -->
    <input type="file" id="faq-upload" accept=".pdf,.txt,.docx,.csv">
    <button class="upload-btn" onclick="uploadFAQ()">📎 Upload FAQ</button>
    <!-- exact id: upload-status -->
    <span id="upload-status"></span>
  </div>

  <div class="input-row">
    <!-- exact id: mic-btn, exact title kept -->
    <div id="mic-btn" title="Click to speak">🎤</div>
    <!-- exact id: query-box -->
    <input id="query-box" type="text" placeholder="Type your question…">
    <!-- exact id / onclick: send-btn / askQuestion() -->
    <button id="send-btn" onclick="askQuestion()">Send ↑</button>
  </div>

</div>

<!-- ══════════════════════════════════════════════════════
     JAVASCRIPT — every function name, fetch URL, JSON key,
     and DOM id is kept exactly as in the original.
     Only the thinking bubble HTML is slightly enhanced.
════════════════════════════════════════════════════════ -->
<script>
/* ── Speech Recognition — exact logic ── */
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec;

if (SpeechRec) {
  rec = new SpeechRec();
  rec.lang = 'en-IN';           // exact: en-IN
  rec.continuous = false;
  rec.onresult = e => {
    document.getElementById('query-box').value = e.results[0][0].transcript;
    stopListening();
    askQuestion();
  };
  rec.onerror = e => {
    addSystem('Mic error: ' + e.error + ' — use Chrome');
    stopListening();
  };
  rec.onend = () => stopListening();
}

document.getElementById('mic-btn').onclick = () => {
  if (!rec) { addSystem('Speech not supported — please use Chrome'); return; }
  if (document.getElementById('mic-btn').classList.contains('listening')) {
    rec.stop();
  } else {
    rec.start();
    document.getElementById('mic-btn').classList.add('listening');
    addSystem('Listening…');
  }
};

/* ── Enter key — exact ── */
document.getElementById('query-box').addEventListener('keydown', e => {
  if (e.key === 'Enter') askQuestion();
});

/* ── Helpers — exact function names ── */
function stopListening() {
  document.getElementById('mic-btn').classList.remove('listening');
}

function useChip(text) {
  document.getElementById('query-box').value = text;
  document.getElementById('suggestions').style.display = 'none';
  askQuestion();
}

function addBubble(type, html) {
  const chat = document.getElementById('chat');
  const div  = document.createElement('div');
  div.className = 'bubble ' + type;
  div.innerHTML  = html;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addSystem(msg) {
  const chat = document.getElementById('chat');
  const div  = document.createElement('div');
  div.className   = 'system-msg';
  div.textContent = msg;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* ── askQuestion — exact fetch URL '/ask', exact JSON key 'query',
      exact response keys: d.not_found, d.answer, d.confidence,
      d.warning, d.matched_question ── */
async function askQuestion() {
  const box = document.getElementById('query-box');
  const q   = box.value.trim();
  if (!q) return;
  box.value = '';

  addBubble('user', q);

  /* Thinking bubble — enhanced HTML but same class 'thinking' */
  const thinking = addBubble('thinking',
    '<div class="typing-dots"><span></span><span></span><span></span></div> Searching knowledge base…'
  );

  try {
    const r = await fetch('/ask', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ query: q })   // exact key: query
    });
    const d = await r.json();
    thinking.remove();

    /* exact: d.not_found check */
    if (d.not_found) {
      addBubble('not-found', d.answer);
      return;
    }

    /* exact confidence math and color thresholds */
    const pct      = Math.round(d.confidence * 100);
    const barColor = pct > 60 ? '#10B981' : pct > 35 ? '#F59E0B' : '#EF4444';

    /* exact: d.warning, d.matched_question */
    const warningHtml = d.warning
      ? `<div class="warning-tag">⚠ ${d.warning}</div>` : '';
    const matchedHtml = d.matched_question
      ? `<div class="matched-tag">Matched: "${d.matched_question}"</div>` : '';

    /* exact: encodedAnswer used in playAudio onclick */
    const encodedAnswer = encodeURIComponent(d.answer);

    addBubble('bot', `
      ${warningHtml}
      <div>${d.answer}</div>
      ${matchedHtml}
      <div class="conf-row">
        <div class="conf-bar-bg">
          <div class="conf-bar-fill" style="width:${pct}%;background:${barColor}"></div>
        </div>
        <div class="conf-pct">${pct}%</div>
      </div>
      <button class="play-btn" onclick="playAudio('${encodedAnswer}')">▶ Play audio</button>
    `);

  } catch (e) {
    thinking.remove();
    addBubble('not-found', 'Cannot reach server. Is Flask running? (python app.py)');
  }
}

/* ── playAudio — exact fetch URL '/speak', exact JSON key 'text' ── */
async function playAudio(encodedText) {
  const text = decodeURIComponent(encodedText);
  try {
    const r = await fetch('/speak', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ text })   // exact key: text
    });
    if (!r.ok) throw new Error();
    const blob = await r.blob();
    new Audio(URL.createObjectURL(blob)).play();
  } catch {
    addSystem('Audio failed — need internet for gTTS');
  }
}

/* ── uploadFAQ — exact fetch URL '/upload', exact FormData key 'file',
      exact response keys: d.message, d.error ── */
async function uploadFAQ() {
  const file   = document.getElementById('faq-upload').files[0];
  const status = document.getElementById('upload-status');
  if (!file) {
    status.textContent  = 'Select a file first';
    status.style.color  = '#EF4444';
    return;
  }
  status.textContent = 'Uploading…';
  status.style.color = '#94A3B8';

  const fd = new FormData();
  fd.append('file', file);   // exact key: file

  try {
    const r = await fetch('/upload', { method: 'POST', body: fd });
    const d = await r.json();
    status.textContent = d.message || d.error;
    status.style.color = d.error ? '#EF4444' : '#10B981';
    if (d.message) {
      addSystem(d.message);
      location.reload();   // exact: reload on success
    }
  } catch {
    status.textContent = 'Upload failed';
    status.style.color = '#EF4444';
  }
}

/* ── Initial greeting — exact text ── */
addBubble('bot', 'Hello! I am the PeopleXM Voice Bot. Ask me anything about HR policies, leave, payroll, or IT support. You can also click a suggested question above to get started.');
</script>
</body>
</html>
